services:
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: ntfy
    restart: unless-stopped
    command: serve
    ports:
      - "2586:80"
    environment:
      - TZ=${TZ}
    volumes:
      - ./server.yml:/etc/ntfy/server.yml:ro
      - ntfy_cache:/var/cache/ntfy
      - ntfy_data:/var/lib/ntfy

volumes:
  ntfy_cache:
    name: ntfy_cache
  ntfy_data:
    name: ntfy_data
