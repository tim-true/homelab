global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'homelab-monitor'
    environment: 'production'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: 'raspberry-pi'
          host: '192.168.1.100'

  - job_name: 'qnap_network'
    static_configs:
      - targets: ['192.168.1.34']
    metrics_path: /snmp
    params:
      module: [if_mib]
      auth: [qnap_v3]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: snmp-exporter:9116

  - job_name: 'qnap_system'
    static_configs:
      - targets: ['192.168.1.34']
    metrics_path: /snmp
    params:
      module: [qnap_nas]
      auth: [qnap_v3]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: snmp-exporter:9116
