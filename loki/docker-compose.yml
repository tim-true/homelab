services:
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki-data:/loki
      - ./config-loki:/etc/loki
    networks:
      - monitoring

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    volumes:
      - /home/phantom6047/homelab/nginx-proxy-manager/logs:/var/log
      - ./config-promtail/config.yaml:/etc/promtail/config.yaml
    networks:
      - monitoring

networks:
  monitoring:
    external: true
    name: monitoring
