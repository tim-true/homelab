services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    ports:
      - 3030:3000
    environment:
      HOMEPAGE_ALLOWED_HOSTS: "${HOMEPAGE_DOMAIN},${HOMEPAGE_LOCAL}"
      TZ: "${TZ}"
    volumes:
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
